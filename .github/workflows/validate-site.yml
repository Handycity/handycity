name: Validate Site Content

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run content:validate
      - run: npm run assets:validate
      - run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: 1
          PUBLIC_SITE_BASE: /handycity/
