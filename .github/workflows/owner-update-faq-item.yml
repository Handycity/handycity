name: Owner Update FAQ Item

on:
  workflow_dispatch:
    inputs:
      action:
        description: "FAQ aktualisieren oder entfernen"
        required: true
        type: choice
        options:
          - upsert
          - remove
      question:
        description: "FAQ Frage"
        required: true
        type: string
      answer:
        description: "FAQ Antwort (bei remove leer lassen)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: update
        env:
          ACTION: ${{ inputs.action }}
          QUESTION: ${{ inputs.question }}
          ANSWER: ${{ inputs.answer }}
        run: |
          npm run owner:update:faq
          npm run content:validate
          npm run assets:validate
          ASTRO_TELEMETRY_DISABLED=1 PUBLIC_SITE_BASE=/ npm run build

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/content
          git commit -m "chore: update faq item"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
