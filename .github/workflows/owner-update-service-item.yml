name: Owner Update Service Item

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Service aktualisieren oder entfernen"
        required: true
        type: choice
        options:
          - upsert
          - remove
      name:
        description: "Service-Name"
        required: true
        type: string
      description:
        description: "Service-Beschreibung"
        required: false
        type: string
      icon:
        description: "Icon-Name, z. B. smartphone oder truck"
        required: false
        type: string
      price:
        description: "Preistext, z. B. Preis auf Anfrage"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: update
        env:
          ACTION: ${{ inputs.action }}
          NAME: ${{ inputs.name }}
          DESCRIPTION: ${{ inputs.description }}
          ICON: ${{ inputs.icon }}
          PRICE: ${{ inputs.price }}
        run: |
          npm run owner:update:service
          npm run content:validate
          npm run assets:validate
          ASTRO_TELEMETRY_DISABLED=1 PUBLIC_SITE_BASE=/handycity/ npm run build

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/content.yaml
          git commit -m "chore: update service item"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
