name: Sync Willhaben Offers

on:
  workflow_dispatch:
    inputs:
      shop_url:
        description: "Willhaben-Shop-URL"
        required: false
        type: string
      max_offers:
        description: "Maximale Anzahl an Angeboten"
        required: false
        default: "12"
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Vienna
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - id: sync
        env:
          WILLHABEN_SHOP_URL: ${{ inputs.shop_url }}
          WILLHABEN_MAX_OFFERS: ${{ inputs.max_offers }}
        run: |
          npm run owner:sync:willhaben
          npm run content:validate
          ASTRO_TELEMETRY_DISABLED=1 npm run build

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/content.yaml
          git commit -m "chore: sync willhaben offers"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
