      description: Unscharfe Bilder oder defekte Kamera? Wir reparieren Front- und Hauptkamera.
      icon: camera
      price: Preis auf Anfrage
    - name: Ladekonnektor
      description: Handy lädt nicht mehr? Wir reparieren oder tauschen den Ladeanschluss.
