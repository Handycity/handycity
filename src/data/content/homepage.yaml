trust:
  headline: Warum Handycity?
  items:
    - title: Erfahrene Techniker
      description: Unser Team verfügt über langjährige Erfahrung in der Reparatur aller gängigen Geräte.
      icon: award
    - title: Schnelle Reparatur
      description: Die meisten Reparaturen erledigen wir noch am selben Tag.
      icon: zap
    - title: Faire Preise
      description: Transparente Preisgestaltung ohne versteckte Kosten. Geräte-Retter-Prämie einlösbar.
      icon: piggy-bank
