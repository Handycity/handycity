process:
  headline: So einfach funktioniert's
  steps:
    - step: "1"
      title: Kontakt aufnehmen
      description: Rufen Sie uns an oder schreiben Sie uns – wir beraten Sie gerne.
      icon: phone
    - step: "2"
      title: Gerät vorbeibringen
      description: Kommen Sie zu uns am Kardinalplatz 6 und wir prüfen Ihr Gerät direkt vor Ort.
      icon: map-pin
    - step: "3"
      title: Diagnose & Reparatur
      description: Unsere Techniker analysieren den Schaden und reparieren Ihr Gerät fachgerecht.
      icon: wrench
    - step: "4"
      title: Gerät abholen
      description: Ihr repariertes Gerät ist bereit – schnell und zuverlässig.
      icon: check-circle
contact:
