  subheadline: Schreiben Sie uns oder rufen Sie direkt an – wir beraten Sie gerne
  formAction: https://formspree.io/f/YOUR_FORM_ID
  fields:
    - name: name
      label: Name
      type: text
      required: true
    - name: email
      label: E-Mail
      type: email
      required: true
    - name: phone
      label: Telefon
      type: tel
      required: false
    - name: device
      label: Gerät & Modell
      type: text
      required: false
    - name: message
      label: Ihre Nachricht
      type: textarea
      required: true
