# ------ Willhaben / Handy kaufen ------
willhaben:
  headline: "Handy kaufen"
  description: "Entdecken Sie bei uns die Möglichkeit, ein neues Handy zu erwerben. Besuchen Sie gerne unser Geschäft in Klagenfurt oder stöbern Sie auf der Plattform Willhaben, um unsere Auswahl zu erkunden. Wir freuen uns darauf, Ihnen bei der Suche nach Ihrem perfekten Smartphone behilflich zu sein!"
