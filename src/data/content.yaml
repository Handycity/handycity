    E-Mail: office@handycityarkaden.at
    Tel: +43 463/918559

    ## Erhobene Daten

    Diese Website wird auf GitHub Pages gehostet. Beim Besuch dieser Website werden
    keine Cookies gesetzt und keine personenbezogenen Daten erhoben, die über die
    technisch notwendige Verarbeitung durch den Hosting-Anbieter hinausgehen.

    ## Kontaktformular

    Wenn Sie das Kontaktformular nutzen, werden Ihre Angaben (Name, E-Mail, Telefon,
