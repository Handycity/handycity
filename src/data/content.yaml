      title: "Bon beantragen"
      description: "Online auf geräte-retter-prämie.at einen Bon erstellen."
    - step: "2"
      title: "Zu uns kommen"
      description: "Bringen Sie Ihr Gerät und den Bon zu Handycity."
    - step: "3"
      title: "Geld zurück"
      description: "Der Förderbetrag wird auf Ihr Bankkonto überwiesen."

