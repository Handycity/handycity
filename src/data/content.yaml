# ------ Geräte-Retter-Prämie ------
geraeteRetterPraemie:
  headline: "Geräte-Retter-Prämie"
  subheadline: "Sparen Sie bis zu €130 bei Ihrer Reparatur!"
  description: "Als registrierter Partnerbetrieb der Geräte-Retter-Prämie können Sie bei uns Ihren Bon einlösen. Sie erhalten 50 % der Reparaturkosten zurück – bis zu €130."
  highlights:
    - "50 % Ersparnis auf förderungsfähige Reparaturen"
    - "Bis zu €130 für Reparatur, Service & Wartung"
    - "Bis zu €30 für Kostenvoranschlag"
    - "Bon online beantragen auf geräte-retter-prämie.at"
  ctaText: "Mehr erfahren"
  ctaHref: "https://www.oesterreich.gv.at/de/themen/umwelt_und_klima/energie_und_ressourcen_sparen/geraete-retter-praemie"
